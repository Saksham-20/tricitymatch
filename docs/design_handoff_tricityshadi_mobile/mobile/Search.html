<!doctype html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8" />
<title>TricityShadi Mobile — Search</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="design_doc_mode" content="canvas" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../ts-mobile.css" />
<style>
  body{background:#0e0f13;}
  .canvas-title{position:absolute;left:60px;top:20px;color:#e8eaed;font-family:'Playfair Display',serif;font-size:30px;font-weight:600;}
  .canvas-sub{position:absolute;left:60px;top:62px;color:#9aa1ad;font-size:14px;font-family:'Inter',sans-serif;}
  .sbar{display:flex;gap:10px;padding:6px 18px 10px;}
  .sbar .fld{flex:1;display:flex;align-items:center;gap:9px;height:44px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:0 13px;color:var(--muted);font-size:var(--t-callout);}
  .sbar .fld svg{width:19px;height:19px}
  .sbar .fbtn{width:44px;height:44px;border-radius:var(--r-md);background:var(--p-500);color:#fff;display:grid;place-items:center;position:relative}
  .sbar .fbtn svg{width:20px;height:20px}
  .sbar .fbtn .cnt{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;border-radius:9px;background:var(--g-500);color:#3D2914;font-size:10px;font-weight:800;display:grid;place-items:center;border:2px solid var(--bg)}
  .sortrow{display:flex;align-items:center;justify-content:space-between;padding:4px 18px 8px;}
  .sortrow .res{font-size:var(--t-footnote);color:var(--muted)}
  .sortrow .res b{color:var(--fg-strong)}
  .sortrow .sort{display:flex;align-items:center;gap:6px;font-size:var(--t-subhead);font-weight:600;color:var(--accent)}
  .sortrow .sort svg{width:16px;height:16px}
  .saved{display:flex;gap:8px;overflow-x:auto;padding:0 18px 12px}
  .saved::-webkit-scrollbar{display:none}
  .rcard{display:flex;gap:12px;margin:0 18px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:11px;box-shadow:var(--e1)}
  .rcard .ph{width:92px;height:118px;border-radius:12px;overflow:hidden;flex:none}
  .rcard .info{flex:1;min-width:0;display:flex;flex-direction:column}
  .rcard .info .nm{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--fg-strong);display:flex;align-items:center;gap:5px}
  .rcard .info .nm svg{width:15px;height:15px;color:var(--success)}
  .rcard .info .det{font-size:var(--t-footnote);color:var(--muted);margin-top:3px;line-height:1.5}
  .rcard .info .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
  .rcard .info .tags span{font-size:11px;font-weight:600;color:var(--fg);background:var(--surface-2);border:1px solid var(--border);padding:2px 7px;border-radius:6px}
  .rcard .info .acts{margin-top:auto;display:flex;gap:7px;padding-top:9px}
  .rcard .info .acts button{flex:1;height:36px;border-radius:9px;border:1.5px solid var(--border);background:var(--card);font:inherit;font-size:13px;font-weight:600;color:var(--fg-strong);display:flex;align-items:center;justify-content:center;gap:5px}
  .rcard .info .acts button svg{width:15px;height:15px}
  .rcard .info .acts button.pri{background:var(--accent-soft);color:var(--accent);border-color:transparent}
  .rcard .cm{position:absolute}
  /* slider */
  .slider{margin:14px 0 4px}
  .slider .lab{display:flex;justify-content:space-between;font-size:var(--t-subhead);margin-bottom:11px}
  .slider .lab b{color:var(--fg-strong)}
  .slider .lab .v{color:var(--accent);font-weight:700}
  .track{height:4px;border-radius:3px;background:var(--surface-2);position:relative}
  .track .fill{position:absolute;height:100%;background:var(--p-500);border-radius:3px}
  .track .h{position:absolute;top:50%;transform:translate(-50%,-50%);width:24px;height:24px;border-radius:50%;background:#fff;border:2px solid var(--p-500);box-shadow:var(--e2)}
  .frow{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-top:1px solid var(--hairline)}
  .frow .fl b{font-size:var(--t-callout);color:var(--fg-strong);font-weight:600;display:block}
  .frow .fl span{font-size:var(--t-footnote);color:var(--muted)}
  .chipwrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
</style>
</head>
<body>
<div class="canvas-title">Search — browse &amp; filter</div>
<div class="canvas-sub">Infinite list · saved searches · FilterPanel native bottom sheet (range sliders, gotra exclude, manglik, radius)</div>
<script src="frame.js"></script>
<script>
function rcard(name,prof,loc,tags,compat,verified=true){
  return `<div class="rcard"><div class="ph">${ph('','i-user').replace('class="ph "','class="ph"')}</div>
    <div class="info"><div class="nm">${name}${verified?'<svg class="i"><use href="#i-check"/></svg>':''}</div>
    <div class="det">${prof}<br>${loc}</div>
    <div class="tags">${tags.map(t=>`<span>${t}</span>`).join('')}<span style="background:var(--accent-soft);color:var(--accent);border:0">${compat}% match</span></div>
    <div class="acts"><button class="pri"><svg class="i"><use href="#i-heart"/></svg>Interest</button><button><svg class="i"><use href="#i-bookmark"/></svg>Save</button></div></div></div>`;
}
function searchTop(){
  return `<div class="navbar largetitle" style="border:0;background:transparent;backdrop-filter:none;display:block"><h1 style="padding:0 18px">Search</h1></div>
  <div class="sbar"><div class="fld"><svg class="i"><use href="#i-search"/></svg>Name, profession, city…</div>
  <div class="fbtn"><svg class="i"><use href="#i-sliders"/></svg><span class="cnt">4</span></div></div>
  <div class="sortrow"><div class="res"><b>248</b> matches in Tricity</div><div class="sort"><svg class="i"><use href="#i-filter"/></svg>Best match</div></div>
  <div class="saved"><span class="chip on">All</span><span class="chip"><svg class="i"><use href="#i-bookmark"/></svg>Doctors 26–30</span><span class="chip">NRIs</span><span class="chip">+ Save search</span></div>`;
}
function searchResults(){
  return `<div class="vp"><div class="scroll" style="padding-top:6px">${searchTop()}
    ${rcard("Aanya Sharma, 27","Software Engineer · 5'4\"","Mohali · Khatri",["Never married","B.Tech"],87)}
    ${rcard("Simran Kaur, 26","Doctor (MD) · 5'5\"","Chandigarh · Jat Sikh",["Never married","Manglik"],81)}
    ${rcard("Ishita Bansal, 28","Architect · 5'3\"","Panchkula · Aggarwal",["Never married","M.Arch"],74,false)}
    <div style="padding:14px;text-align:center;color:var(--muted);font-size:13px;display:flex;align-items:center;justify-content:center;gap:8px"><span class="sk" style="width:16px;height:16px;border-radius:50%;animation:none;border:2px solid var(--border);border-top-color:var(--accent);animation:spin .8s linear infinite"></span>Loading more…</div>
  </div>${tabBar('search',{chatBadge:'2'})}</div>`;
}
function filterSheet(){
  return `<div class="vp"><div class="scroll" style="padding-top:6px;filter:saturate(.6)">${searchTop()}${rcard("Aanya Sharma, 27","Software Engineer · 5'4\"","Mohali · Khatri",["Never married"],87)}</div>${tabBar('search')}
  <div class="sheet"><div class="backdrop"></div>
    <div class="panel"><div class="grab"></div>
      <div class="s-head"><h3>Filters</h3><span style="font-size:14px;color:var(--accent);font-weight:600">Reset</span></div>
      <div class="scroll" style="padding:4px 18px 0;max-height:520px">
        <div class="slider"><div class="lab"><b>Age</b><span class="v">26 – 32 yrs</span></div><div class="track"><div class="fill" style="left:24%;right:42%"></div><div class="h" style="left:24%"></div><div class="h" style="left:58%"></div></div></div>
        <div class="slider"><div class="lab"><b>Height</b><span class="v">5'2" – 5'8"</span></div><div class="track"><div class="fill" style="left:18%;right:30%"></div><div class="h" style="left:18%"></div><div class="h" style="left:70%"></div></div></div>
        <div class="slider"><div class="lab"><b>Annual income</b><span class="v">₹8 – 25 LPA</span></div><div class="track"><div class="fill" style="left:30%;right:25%"></div><div class="h" style="left:30%"></div><div class="h" style="left:75%"></div></div></div>
        <div class="frow"><div class="fl"><b>Community / Caste</b><span>Khatri, Aggarwal +2</span></div><svg class="i" style="color:var(--n-400)"><use href="#i-fwd"/></svg></div>
        <div class="frow"><div class="fl"><b>Exclude same gotra</b><span>Recommended</span></div><span class="switch on"></span></div>
        <div class="frow"><div class="fl"><b>Manglik</b><span>Any · Yes · No</span></div><div class="seg" style="width:160px"><button aria-selected="true">Any</button><button>Yes</button><button>No</button></div></div>
        <div class="frow" style="display:block"><div class="fl" style="margin-bottom:10px"><b>Location radius</b><span>Within 50 km of Chandigarh</span></div>
          <div class="chipwrap"><span class="chip on">Tricity</span><span class="chip">25 km</span><span class="chip on">50 km</span><span class="chip">Anywhere</span></div></div>
        <div style="height:14px"></div>
      </div>
      <div style="padding:12px 18px;display:flex;gap:10px;border-top:1px solid var(--hairline)">
        <button class="btn btn-ghost" style="flex:none;padding:0 16px"><svg class="i"><use href="#i-bookmark"/></svg></button>
        <button class="btn btn-primary" style="flex:1">Show 248 matches</button></div>
    </div></div></div>`;
}
function searchLoading(){
  const sk=`<div class="rcard"><div class="sk" style="width:92px;height:118px;border-radius:12px"></div><div style="flex:1"><div class="sk" style="height:16px;width:65%"></div><div class="sk" style="height:11px;width:85%;margin-top:9px"></div><div class="sk" style="height:11px;width:50%;margin-top:7px"></div><div class="sk" style="height:32px;width:100%;margin-top:14px;border-radius:9px"></div></div></div>`;
  return `<div class="vp"><div class="scroll" style="padding-top:6px">${searchTop()}${sk}${sk}${sk}</div>${tabBar('search')}</div>`;
}
function searchEmpty(){
  return `<div class="vp"><div class="scroll" style="padding-top:6px">${searchTop()}
    <div class="empty" style="margin-top:24px"><div class="ei"><svg class="i"><use href="#i-search"/></svg></div>
    <h3>No profiles match</h3><p>Your filters are quite specific. Loosen age or location to see more people.</p>
    <button class="btn btn-secondary btn-sm"><svg class="i" style="width:16px"><use href="#i-sliders"/></svg>Edit filters</button></div>
  </div>${tabBar('search')}</div>`;
}

const Y=140;
frame({x:60,  y:Y, label:'Search · Results', pills:[['','LIGHT']], theme:'light', screen:searchResults()});
frame({x:540, y:Y, label:'Search · Filter sheet', pills:[['state','BOTTOM SHEET']], theme:'light', screen:filterSheet()});
frame({x:1020,y:Y, label:'Search · Loading', pills:[['state','SKELETON']], theme:'light', screen:searchLoading()});
frame({x:1500,y:Y, label:'Search · Empty', pills:[['state','EMPTY']], theme:'light', screen:searchEmpty()});
frame({x:1980,y:Y, label:'Search · Results', pills:[['dark','DARK']], theme:'dark', statusVariant:'ondark', screen:searchResults()});

redline(60, Y+930,'Search — redlines',[
  ['Search field','44pt · surface-2 · filter btn burgundy w/ gold active-count badge'],
  ['Result card','photo 92×118 r-12 · Playfair name · tag chips · 2 actions 36pt'],
  ['Infinite scroll','prefetch at 80% · skeleton rows append · dur.base fade'],
  ['Saved search','chip row · "+ Save search" persists current filter set'],
]);
redline(540, Y+930,'Filter sheet',[
  ['Open','spring.sheet · backdrop scrim fade dur.base · grabber drag-to-dismiss'],
  ['Snap points','half / full · sliders use Gesture Handler, haptic.light on step'],
  ['Manglik','segmented Any/Yes/No · gotra exclude switch default ON'],
  ['Apply','sticky footer · live count · bookmark = save search'],
]);
</script>
</body>
</html>
