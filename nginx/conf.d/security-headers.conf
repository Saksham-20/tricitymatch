# Additional security headers for production
# Included by nginx.conf via `include /etc/nginx/conf.d/*.conf;`

# Content Security Policy — tighten before launch
# add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://checkout.razorpay.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://res.cloudinary.com; connect-src 'self' wss://tricityshadi.com; frame-src https://api.razorpay.com;" always;

# Permissions Policy
add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
